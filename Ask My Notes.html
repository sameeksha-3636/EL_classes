<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AskMyNotes</title>
</head>
<body>

    <h1>AskMyNotes</h1>

    <p>Upload your notes and ask questions from them.</p>

    <hr>

    <h2>Upload Notes</h2>

    <label for="notes">Choose your notes file:</label>
    <input type="file" id="notes" name="notes">

    <hr>

    <h2>Ask a Question</h2>

    <label for="question">Enter your question:</label>
    <br><br>

    <textarea
        id="question"
        name="question"
        rows="8"
        cols="80"
        placeholder="Type your question here...">
    </textarea>

    <br><br>

    <button type="button">Ask My Notes</button>

    <hr>

    <h2>Answer</h2>

    <p>Your AI-generated answer will appear here.</p>

    <p>AskMyNotes Capstone Project</p>

</body>
</html>
