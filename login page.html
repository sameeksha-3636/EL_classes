<!DOCTYPE html>
<html>
<head>
    <title>Create Account</title>
</head>
<body>

    <center>

        <h1>Create Account</h1>

        <form>

            <label><b>Full Name</b></label><br>
            <input type="text" placeholder="Your name" size="40"><br><br>

            <label><b>Email Address</b></label><br>
            <input type="email" placeholder="you@example.com" size="40"><br><br>

            <label><b>Password</b></label><br>
            <input type="password" placeholder="Enter password" size="40"><br><br>

            <label><b>Confirm Password</b></label><br>
            <input type="password" placeholder="Confirm password" size="40"><br><br>

            <input type="submit" value="Sign Up">

        </form>

        <br>

        <p>
            Already have an account?
            <a href="login.html">Login Here</a>
        </p>

    </center>

</body>
</html>
